<!doctype html>
<html lang="en">
  
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Register</title>

 <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&display=swap" rel="stylesheet">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="style.css">
</head>

<body class="login-bg">

<div class="d-flex justify-content-center align-items-center vh-100">
  <div class="card login-card p-4">

    <h2 class="bitcount text-center mb-4">Student Registration</h2>

    <div class="alert alert-success" id="registerMessage" style="display:none;">
      Registration successful! Please login.
    </div>

    <form id="registerForm">

      <label class="oswald"><i class="bi bi-person"></i>  Full Name</label>
      <input type="text" id="nameInput" class="form-control mb-3" required>

      <label class="oswald"><i class="bi bi-envelope"></i>  Email</label>
      <input type="email" id="emailInput" class="form-control mb-3" required>

      <label class="oswald"><i class="bi bi-lock"></i>  Password</label>
      <input type="password" id="passwordInput" class="form-control mb-3" required>

      <button type="submit" class="btn btn-primary w-100">
        Register
      </button>

      <div class="text-center mt-3">
        <a href="index.html">Back to Login</a>
      </div>

    </form>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.fog.min.js"></script>

<script>
VANTA.FOG({
  el: ".login-bg",
  mouseControls: true,
  touchControls: true,
  gyroControls: false,
  minHeight: 200.00,
  minWidth: 200.00,
  highlightColor: 0x53775f,
  midtoneColor: 0xe3ff,
  lowlightColor: 0xe3dff,
  blurFactor: 0.29,
  speed: 1.10,
  zoom: 1.30
});

// Register using LocalStorage
document.getElementById("registerForm").addEventListener("submit", function(e){
  e.preventDefault();
  let name = document.getElementById("nameInput").value.trim();
  let email = document.getElementById("emailInput").value.trim();
  let password = document.getElementById("passwordInput").value.trim();

  if(name && email && password){
    let users = JSON.parse(localStorage.getItem("users") || "[]");

    if(users.some(u => u.email === email)){
      alert("Email sudah digunakan, sila gunakan email lain!");
      return;
    }

    users.push({name, email, password});
    localStorage.setItem("users", JSON.stringify(users));

    document.getElementById("registerMessage").style.display = "block";

    document.getElementById("nameInput").value='';
    document.getElementById("emailInput").value='';
    document.getElementById("passwordInput").value='';
  }
});
</script>

</body>
</html>
