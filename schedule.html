<div class="container mt-4">
  <div class="row justify-content-center">
    <div class="col-lg-12">
      <div class="card dashboard-card p-4 mb-4">
        <h3>Smart Schedule</h3>
        <div class="row g-2 mb-3">
          <div class="col-md-4">
            <select id="dayInput" class="form-select">
              <option>Monday</option>
              <option>Tuesday</option>
              <option>Wednesday</option>
              <option>Thursday</option>
              <option>Friday</option>
            </select>
          </div>
          <div class="col-md-4">
            <input type="text" id="subjectInput" class="form-control" placeholder="Subject">
          </div>
          <div class="col-md-4">
            <div class="d-flex gap-2">
              <select id="hourInput" class="form-select">
                <option>8</option><option>9</option><option>10</option><option>11</option>
                <option>12</option><option>1</option><option>2</option><option>3</option>
                <option>4</option><option>5</option><option>6</option><option>7</option>
              </select>
              <select id="ampmInput" class="form-select">
                <option>AM</option>
                <option>PM</option>
              </select>
            </div>
          </div>
        </div>
        <button class="btn btn-primary mb-3" onclick="addSchedule()">
          <i class="bi bi-plus-circle"></i> Add Schedule
        </button>

        <table class="table table-bordered text-center align-middle schedule-table">
          <thead>
            <tr>
              <th>Day</th>
              <th>8AM</th><th>9AM</th><th>10AM</th><th>11AM</th>
              <th>12PM</th><th>1PM</th><th>2PM</th><th>3PM</th>
              <th>4PM</th><th>5PM</th><th>6PM</th><th>7PM</th>
            </tr>
          </thead>
          <tbody>
            <tr><th>Monday</th><td data-day="Monday" data-time="8AM"></td><td data-day="Monday" data-time="9AM"></td><td data-day="Monday" data-time="10AM"></td><td data-day="Monday" data-time="11AM"></td><td data-day="Monday" data-time="12PM"></td><td data-day="Monday" data-time="1PM"></td><td data-day="Monday" data-time="2PM"></td><td data-day="Monday" data-time="3PM"></td><td data-day="Monday" data-time="4PM"></td><td data-day="Monday" data-time="5PM"></td><td data-day="Monday" data-time="6PM"></td><td data-day="Monday" data-time="7PM"></td></tr>
            <tr><th>Tuesday</th><td data-day="Tuesday" data-time="8AM"></td><td data-day="Tuesday" data-time="9AM"></td><td data-day="Tuesday" data-time="10AM"></td><td data-day="Tuesday" data-time="11AM"></td><td data-day="Tuesday" data-time="12PM"></td><td data-day="Tuesday" data-time="1PM"></td><td data-day="Tuesday" data-time="2PM"></td><td data-day="Tuesday" data-time="3PM"></td><td data-day="Tuesday" data-time="4PM"></td><td data-day="Tuesday" data-time="5PM"></td><td data-day="Tuesday" data-time="6PM"></td><td data-day="Tuesday" data-time="7PM"></td></tr>
            <tr><th>Wednesday</th><td data-day="Wednesday" data-time="8AM"></td><td data-day="Wednesday" data-time="9AM"></td><td data-day="Wednesday" data-time="10AM"></td><td data-day="Wednesday" data-time="11AM"></td><td data-day="Wednesday" data-time="12PM"></td><td data-day="Wednesday" data-time="1PM"></td><td data-day="Wednesday" data-time="2PM"></td><td data-day="Wednesday" data-time="3PM"></td><td data-day="Wednesday" data-time="4PM"></td><td data-day="Wednesday" data-time="5PM"></td><td data-day="Wednesday" data-time="6PM"></td><td data-day="Wednesday" data-time="7PM"></td></tr>
            <tr><th>Thursday</th><td data-day="Thursday" data-time="8AM"></td><td data-day="Thursday" data-time="9AM"></td><td data-day="Thursday" data-time="10AM"></td><td data-day="Thursday" data-time="11AM"></td><td data-day="Thursday" data-time="12PM"></td><td data-day="Thursday" data-time="1PM"></td><td data-day="Thursday" data-time="2PM"></td><td data-day="Thursday" data-time="3PM"></td><td data-day="Thursday" data-time="4PM"></td><td data-day="Thursday" data-time="5PM"></td><td data-day="Thursday" data-time="6PM"></td><td data-day="Thursday" data-time="7PM"></td></tr>
            <tr><th>Friday</th><td data-day="Friday" data-time="8AM"></td><td data-day="Friday" data-time="9AM"></td><td data-day="Friday" data-time="10AM"></td><td data-day="Friday" data-time="11AM"></td><td data-day="Friday" data-time="12PM"></td><td data-day="Friday" data-time="1PM"></td><td data-day="Friday" data-time="2PM"></td><td data-day="Friday" data-time="3PM"></td><td data-day="Friday" data-time="4PM"></td><td data-day="Friday" data-time="5PM"></td><td data-day="Friday" data-time="6PM"></td><td data-day="Friday" data-time="7PM"></td></tr>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script>
let loggedInEmail = localStorage.getItem("loggedInEmail");

if (!loggedInEmail) {
  window.location.href = "index.html";
}

const scheduleKey = "scheduleData_" + loggedInEmail;

let scheduleData =
  JSON.parse(localStorage.getItem(scheduleKey)) || [];

const darkModeToggle = document.getElementById('darkModeToggle');
        const darkModeIcon = document.getElementById('darkModeIcon');
        const htmlElement = document.documentElement;

        //check current theme
        const currentTheme = localStorage.getItem('theme') || 'light';
        htmlElement.setAttribute('data-bs-theme', currentTheme);
        updateIcon(currentTheme);

        //toggle
        darkModeToggle.addEventListener('click', () => {
            const currentTheme = htmlElement.getAttribute('data-bs-theme');
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';

            htmlElement.setAttribute('data-bs-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateIcon(newTheme);
        });

        //change icon
        function updateIcon(theme) {
            if (theme === 'dark'){
                darkModeIcon.className = 'bi bi-sun-fill';
            } else {
                darkModeIcon.className = 'bi bi-moon-stars-fill';
            }
        }

function saveScheduleData() {
  localStorage.setItem(
    scheduleKey,
    JSON.stringify(scheduleData)
  );
}

function addSchedule() {

  let day = document.getElementById("dayInput").value;

  let subject =
    document.getElementById("subjectInput").value.trim();

  let hour = document.getElementById("hourInput").value;

  let ampm = document.getElementById("ampmInput").value;

  if (!subject || !hour || !ampm)
    return alert("Fill all fields");

  let time = hour + ampm;

  scheduleData.push({
    day,
    time,
    subject
  });

  saveScheduleData();

  renderSchedule();

  document.getElementById("subjectInput").value = "";
}

function renderSchedule() {

  document.querySelectorAll("td[data-day]").forEach(cell => {
    cell.innerHTML = "";
  });

  scheduleData.forEach((item, index) => {

    let cell = document.querySelector(
      `td[data-day="${item.day}"][data-time="${item.time}"]`
    );

    if (cell) {

      cell.innerHTML = `
        <small>${item.subject}</small><br>

        <button class="btn btn-sm btn-warning mt-1"
          onclick="editSchedule(${index})">
          Edit
        </button>

        <button class="btn btn-sm btn-danger mt-1"
          onclick="deleteSchedule(${index})">
          X
        </button>
      `;
    }
  });
}

function deleteSchedule(index) {

  scheduleData.splice(index, 1);

  saveScheduleData();

  renderSchedule();
}

function editSchedule(index) {

  let newText = prompt(
    "Edit subject:",
    scheduleData[index].subject
  );

  if (newText) {

    scheduleData[index].subject = newText;

    saveScheduleData();

    renderSchedule();
  }
}

renderSchedule();
</script>
