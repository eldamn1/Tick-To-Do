<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Logout</title>

<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&display=swap" rel="stylesheet">

<!-- Custom CSS -->
<link rel="stylesheet" href="style.css">
</head>

<body class="login-bg">

<div class="d-flex justify-content-center align-items-center vh-100">

  <div class="card login-card p-4 text-center">
    <h2 class="bitcount mb-4"><i class="bi bi-box-arrow-right"></i> Logout</h2>
    <p>You have been logged out.</p>
   <a href="index.html" class="btn btn-primary w-50 d-block mx-auto mt-3">
      Back to Login
  </a>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.fog.min.js"></script>

<script>
VANTA.FOG({
  el: ".login-bg",
  mouseControls: true,
  touchControls: true,
  gyroControls: false,
  minHeight: 200.00,
  minWidth: 200.00,
  highlightColor: 0x53775f,
  midtoneColor: 0xe3ff,
  lowlightColor: 0xe3dff,
  blurFactor: 0.29,
  speed: 1.10,
  zoom: 1.30
});
</script>
