<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tick-To-Do</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&display=swap" rel="stylesheet">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="style.css">
</head>

<body class="login-bg">

<div class="d-flex justify-content-center align-items-center vh-100">

  <div class="card login-card p-4">

    <h2 class="bitcount text-center mb-4"><i class="bi bi-body-text"></i>
      Tick-To-Do
    <i class="bi bi-book-half"></i></h2>

    <div class="text-center mb-4">
        <img src="loginbg.JPG" width="200px" alt="index">
    </div>

    <div class="alert alert-danger" style="display:none;" id="loginError">
      Invalid email or password!
    </div>

    <form id="loginForm">

      <label class="oswald"><i class="bi bi-envelope"></i>  Email</label>
      <input type="email" id="emailInput" class="form-control mb-3" required>

      <label class="oswald"><i class="bi bi-lock"></i>  Password</label>
      <input type="password" id="passwordInput" class="form-control mb-3" required>

      <button type="submit" class="btn btn-primary w-100">
        Login
      </button>

      <div class="text-center mt-3">
        <a href="register.html">Don't have an account? Register</a>
      </div>

    </form>

  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.fog.min.js"></script>

<script>
VANTA.FOG({
  el: ".login-bg",
  mouseControls: true,
  touchControls: true,
  gyroControls: false,
  minHeight: 200.00,
  minWidth: 200.00,
  highlightColor: 0x53775f,
  midtoneColor: 0xe3ff,
  lowlightColor: 0xe3dff,
  blurFactor: 0.29,
  speed: 1.10,
  zoom: 1.30
});

// Login using LocalStorage
document.getElementById("loginForm").addEventListener("submit", function(e){
  e.preventDefault();
  let email = document.getElementById("emailInput").value.trim();
  let password = document.getElementById("passwordInput").value.trim();
  let users = JSON.parse(localStorage.getItem("users") || "[]");
  let user = users.find(u => u.email === email && u.password === password);

  if(user){
    localStorage.setItem("loggedInEmail", email);
    window.location.href = "dashboard.html";
  } else {
    document.getElementById("loginError").style.display = "block";
  }
});
</script>

</body>
</html>
